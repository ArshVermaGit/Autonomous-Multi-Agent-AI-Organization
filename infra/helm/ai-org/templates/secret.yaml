apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-org.fullname" . }}-secrets
  labels:
    {{- include "ai-org.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.postgresql.auth.password | quote }}
  OPENAI_API_KEY: {{ .Values.secretKeys.openaiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secretKeys.anthropicKey | quote }}
