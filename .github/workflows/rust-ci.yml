name: Rust CI

on:
  push:
    branches: [main, develop]
    paths:
      - "moe-scoring/**"
  pull_request:
    branches: [main]
    paths:
      - "moe-scoring/**"

jobs:
  test:
    name: Test Rust
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: moe-scoring

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: moe-scoring

      - name: Check format
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --verbose
